# Render Blueprint for DiskiTrack backend + PostgreSQL.
# Deploy: push to GitHub, then in Render -> New -> Blueprint -> pick this repo.
# After the first deploy, run the one-off DB setup from the service Shell:
#   npm run setup-db
# and set CLIENT_ORIGIN to your Vercel URL.

databases:
  - name: diskitrack-db
    plan: free
    databaseName: diskitrack
    user: diskitrack

services:
  - type: web
    name: diskitrack-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: diskitrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Set this to your Vercel frontend URL after the frontend is deployed,
      # e.g. https://diskitrack.vercel.app
      - key: CLIENT_ORIGIN
        sync: false
